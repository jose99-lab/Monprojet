<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon E-Commerce</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <header class="bg-white shadow">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-800">ShopPro</h1>
      <nav class="space-x-6">
        <a href="#" class="text-gray-600 hover:text-black">Accueil</a>
        <a href="#" class="text-gray-600 hover:text-black">Produits</a>
        <a href="#" class="text-gray-600 hover:text-black">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-20">
    <div class="container mx-auto text-center">
      <h2 class="text-4xl font-bold mb-4">Bienvenue sur ShopPro</h2>
      <p class="mb-6">Découvrez les meilleurs produits au meilleur prix</p>
      <button class="bg-white text-blue-600 px-6 py-3 rounded-full font-semibold hover:bg-gray-200">Acheter maintenant</button>
    </div>
  </section>

  <!-- Produits -->
  <section class="container mx-auto py-12 px-6">
    <h3 class="text-2xl font-bold text-center mb-8">Produits populaires</h3>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

      <!-- Produit 1 -->
      <div class="bg-white rounded-2xl shadow p-4">
        <img src="https://via.placeholder.com/300" class="rounded-xl mb-4" alt="Produit">
        <h4 class="text-lg font-semibold">Produit 1</h4>
        <p class="text-gray-500">Description rapide</p>
        <div class="flex justify-between items-center mt-4">
          <span class="font-bold text-blue-600">$20</span>
          <button class="bg-blue-600 text-white px-4 py-2 rounded">Ajouter</button>
        </div>
      </div>

      <!-- Produit 2 -->
      <div class="bg-white rounded-2xl shadow p-4">
        <img src="https://via.placeholder.com/300" class="rounded-xl mb-4" alt="Produit">
        <h4 class="text-lg font-semibold">Produit 2</h4>
        <p class="text-gray-500">Description rapide</p>
        <div class="flex justify-between items-center mt-4">
          <span class="font-bold text-blue-600">$35</span>
          <button class="bg-blue-600 text-white px-4 py-2 rounded">Ajouter</button>
        </div>
      </div>

      <!-- Produit 3 -->
      <div class="bg-white rounded-2xl shadow p-4">
        <img src="https://via.placeholder.com/300" class="rounded-xl mb-4" alt="Produit">
        <h4 class="text-lg font-semibold">Produit 3</h4>
        <p class="text-gray-500">Description rapide</p>
        <div class="flex justify-between items-center mt-4">
          <span class="font-bold text-blue-600">$50</span>
          <button class="bg-blue-600 text-white px-4 py-2 rounded">Ajouter</button>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-6 text-center">
    <p>&copy; 2026 ShopPro - Tous droits réservés</p>
  </footer>

</body>
</html>
